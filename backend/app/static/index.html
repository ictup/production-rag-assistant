<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Production RAG Assistant</title>
    <link rel="stylesheet" href="/app/app.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="Chat sessions">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">RAG</div>
          <div>
            <h1>Production RAG</h1>
            <p>Workspace assistant</p>
          </div>
        </div>

        <form class="settings" id="settings-form">
          <label>
            API key
            <input
              id="api-key"
              name="api-key"
              type="password"
              autocomplete="off"
              placeholder="dev-key"
            />
          </label>
          <label>
            Workspace
            <input
              id="workspace-id"
              name="workspace-id"
              type="text"
              autocomplete="off"
              value="public"
            />
          </label>
        </form>

        <div class="session-actions">
          <button id="new-session" type="button">+ New</button>
          <button id="reload-sessions" type="button">Reload</button>
        </div>

        <div id="session-list" class="session-list" aria-live="polite"></div>
      </aside>

      <section class="chat-panel" aria-label="Chat">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Current session</p>
            <h2 id="session-title">No session selected</h2>
          </div>
          <div id="status" class="status">Ready</div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <textarea
            id="question"
            name="question"
            rows="3"
            placeholder="Ask about the indexed LLM systems documents..."
            required
          ></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </section>

      <aside class="knowledge-panel" aria-label="Knowledge base and admin">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Knowledge</p>
            <h2>Documents</h2>
          </div>
          <button id="reload-documents" type="button">Reload</button>
        </header>

        <form id="document-form" class="document-form">
          <label>
            Source URI
            <input
              id="document-source-uri"
              name="document-source-uri"
              type="text"
              autocomplete="off"
              placeholder="uploads/notes.md"
              required
            />
          </label>
          <label>
            Title
            <input
              id="document-title"
              name="document-title"
              type="text"
              autocomplete="off"
              placeholder="Optional title"
            />
          </label>
          <label>
            Markdown file
            <input
              id="document-file"
              name="document-file"
              type="file"
              accept=".md,.markdown,.txt,text/markdown,text/plain"
            />
          </label>
          <label>
            Markdown
            <textarea
              id="document-markdown"
              name="document-markdown"
              rows="7"
              placeholder="# Notes&#10;&#10;Paste Markdown here..."
              required
            ></textarea>
          </label>
          <button id="upload-document" type="submit">Upload</button>
        </form>

        <section class="reindex-panel" aria-label="Reindex documents">
          <label>
            Reindex source filter
            <input
              id="reindex-source-uri"
              name="reindex-source-uri"
              type="text"
              autocomplete="off"
              placeholder="Optional source_uri"
            />
          </label>
          <div class="reindex-actions">
            <button id="reindex-dry-run" type="button">Dry run</button>
            <button id="reindex-write" type="button">Write</button>
          </div>
        </section>

        <div id="document-status" class="document-status">Ready</div>
        <div id="document-list" class="document-list" aria-live="polite"></div>

        <section class="admin-panel" aria-label="Admin overview">
          <header class="panel-header">
            <div>
              <p class="eyebrow">Admin</p>
              <h2>Overview</h2>
            </div>
            <button id="reload-admin" type="button">Refresh</button>
          </header>

          <div id="admin-status" class="document-status">Ready</div>

          <div class="admin-stats" aria-label="Admin summary">
            <div class="admin-stat">
              <span>Workspaces</span>
              <strong id="admin-workspace-count">0</strong>
            </div>
            <div class="admin-stat">
              <span>Recent logs</span>
              <strong id="admin-log-count">0</strong>
            </div>
          </div>

          <form id="admin-filter-form" class="admin-filter-form">
            <div class="admin-filter-grid">
              <label>
                Request ID
                <input
                  id="admin-request-id"
                  name="admin-request-id"
                  type="text"
                  autocomplete="off"
                  placeholder="request-..."
                />
              </label>
              <label>
                Session ID
                <input
                  id="admin-session-id"
                  name="admin-session-id"
                  type="text"
                  autocomplete="off"
                  placeholder="Optional UUID"
                />
              </label>
              <label>
                Citation
                <select id="admin-citation-valid" name="admin-citation-valid">
                  <option value="">Any</option>
                  <option value="true">Valid</option>
                  <option value="false">Invalid</option>
                </select>
              </label>
              <label class="admin-toggle">
                <input
                  id="admin-refusal-only"
                  name="admin-refusal-only"
                  type="checkbox"
                />
                Refusals only
              </label>
            </div>
            <div class="admin-filter-actions">
              <button type="submit">Apply</button>
              <button id="clear-admin-filters" type="button">Clear</button>
            </div>
          </form>

          <section class="admin-section" aria-label="Workspaces">
            <h3>Workspaces</h3>
            <div
              id="admin-workspace-list"
              class="admin-list"
              aria-live="polite"
            ></div>
          </section>

          <section class="admin-section" aria-label="Recent chat logs">
            <h3>Recent chat logs</h3>
            <div class="admin-pagination">
              <button id="admin-prev-logs" type="button">Previous</button>
              <span id="admin-page-info">No logs</span>
              <button id="admin-next-logs" type="button">Next</button>
            </div>
            <div id="admin-log-list" class="admin-list" aria-live="polite"></div>
          </section>
        </section>
      </aside>
    </main>

    <script src="/app/app.js" defer></script>
  </body>
</html>
